name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Print toolchain versions
        run: swift --version && xcodebuild -version

      - name: Install swift-format
        run: brew install swift-format

      - name: Run swift-format
        run: swift-format lint --recursive --strict --configuration .swift-format TimeTracker TimeTrackerTests TimeTrackerUITests

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict

  test:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Print toolchain versions
        run: swift --version && xcodebuild -version

      - name: Run unit tests
        run: xcodebuild test -project TimeTracker.xcodeproj -scheme TimeTracker -destination 'platform=macOS' -only-testing:TimeTrackerTests

  ui-test:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Print toolchain versions
        run: swift --version && xcodebuild -version

      - name: Run UI tests
        run: xcodebuild test -project TimeTracker.xcodeproj -scheme TimeTracker -destination 'platform=macOS' -only-testing:TimeTrackerUITests/WorkTaskUITests
