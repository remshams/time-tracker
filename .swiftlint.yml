included:
  - Sources
  - Tests

excluded:
  - .build

reporter: github-actions-logging

line_length:
  warning: 120
  error: 160

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y

disabled_rules:
  - todo

trailing_comma:
  mandatory_comma: true
