included:
  - TimeTracker
  - TimeTrackerTests
  - TimeTrackerUITests

excluded:
  - .build
  - .swiftpm
  - TimeTracker.xcodeproj

reporter: github-actions-logging

# Keep production length thresholds explicit here.
# Test targets can override these in nested .swiftlint.yml files.
file_length:
  warning: 400
  error: 1000

type_body_length:
  warning: 250
  error: 350

line_length:
  warning: 120
  error: 160

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y

disabled_rules:
  - todo

trailing_comma:
  mandatory_comma: true
